<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>硬件项目生成器｜MakerMind AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">MM</span>
      <span>
        <strong>MakerMind AI</strong>
        <small>Hardware learning studio</small>
      </span>
    </a>
    <nav class="nav-links">
      <a href="index.html">首页</a>
      <a href="rules.html">项目门槛</a>
      <a class="active" href="generator.html">生成器</a>
      <a href="gallery.html">作品效果</a>
      <a href="students.html">学生画像</a>
      <a href="about.html">关于我们</a>
    </nav>
  </header>

  <main class="page-shell page-main">
    <section class="page-hero compact left-hero">
      <span class="eyebrow">Generator</span>
      <h1>为一个学生生成三种更有吸引力的硬件项目方向</h1>
      <p>输入知识点，选择学生状态、兴趣和器材，系统会给出项目方案、进阶挑战、老师观察点，以及对应的最终效果参考图</p>
    </section>

    <section class="generator-layout">
      <form class="control-panel" id="projectForm">
        <label>
          要学习的知识点
          <input id="conceptInput" type="text" value="一次函数" placeholder="例如：一次函数、概率、电流、电阻、循环结构" />
        </label>

        <label>
          学科方向
          <select id="subjectSelect">
            <option>数学</option>
            <option>编程</option>
            <option>物理</option>
            <option>科学</option>
            <option>综合 STEM</option>
          </select>
        </label>

        <label>
          学生学习状态
          <select id="levelSelect">
            <option value="top">理解快，需要挑战</option>
            <option value="normal" selected>需要项目带着学</option>
            <option value="weak">基础薄弱，需要拆步骤</option>
            <option value="lowInterest">兴趣低，需要强反馈</option>
          </select>
        </label>

        <label>
          可用硬件套件
          <select id="kitSelect">
            <option value="arduino" selected>Arduino / ESP32 套件</option>
            <option value="k10">UNIHIKER K10(免接线内置屏幕与传感器)</option>
            <option value="microbit">micro:bit 套件</option>
            <option value="paper">纸电路 / 无需编程</option>
            <option value="mixed">纸板 + 电子模块</option>
          </select>
        </label>

        <label>
          学生兴趣偏向
          <div class="chips" id="interestChips">
            <button type="button" class="chip active" data-interest="游戏">游戏</button>
            <button type="button" class="chip" data-interest="宠物">宠物</button>
            <button type="button" class="chip" data-interest="运动">运动</button>
            <button type="button" class="chip" data-interest="音乐">音乐</button>
            <button type="button" class="chip" data-interest="动漫">动漫</button>
            <button type="button" class="chip" data-interest="美食">美食</button>
            <button type="button" class="chip" data-interest="短视频">短视频</button>
          </div>
        </label>

        <label>
          课堂时长
          <select id="durationSelect">
            <option>45 分钟压缩版</option>
            <option selected>60 分钟完成版</option>
            <option>90 分钟挑战版</option>
          </select>
        </label>

        <button class="btn primary wide" type="submit">生成硬件项目</button>
        <a class="text-link" href="gallery.html">先看看项目做出来会长什么样</a>
      </form>

      <div class="result-panel">
        <div class="result-header">
          <div>
            <span>AI 推荐结果</span>
            <h2 id="resultTitle">游戏主题：一次函数硬件项目</h2>
          </div>
          <span class="tag" id="matchTag">课堂可完成 94%</span>
        </div>
        <div class="project-cards" id="projectCards"></div>
      </div>
    </section>
  </main>

  <footer class="footer page-shell">
    <strong>MakerMind AI</strong>
    <span>让项目既能完成，也能先在视觉上抓住学生</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
